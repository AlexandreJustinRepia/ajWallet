name: root_exp
description: "A offline budget application for android"
publish_to: "none"

version: 0.3.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  local_auth: ^2.1.6
  flutter_colorpicker: ^1.1.0
  intl: ^0.19.0
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0
  encrypt: ^5.0.3
  file_picker: ^8.0.0
  path_provider: ^2.1.5
  uuid: ^4.5.3
  http: ^1.6.0
  connectivity_plus: ^7.0.0
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  crypto: ^3.0.7
  pinput: ^6.0.2
  confetti: ^0.8.0
  pdf: ^3.10.8
  printing: ^5.13.1
  share_plus: ^10.0.0
  excel: ^4.0.0
  quick_actions: ^1.0.9
  home_widget: ^0.9.1
  image_picker: ^1.2.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/banks/
    - assets/images/e-wallets/
    - assets/images/onboarding/
    - assets/images/trees/
    - assets/logo/logo.png
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.png"
  min_sdk_android: 21 # should be same as your minSdk in build.gradle

dependency_overrides:
  archive: ^3.6.1
